resolver 127.0.0.11 valid=10s;

upstream api_backend {
    server api:8000;
    keepalive 32;
}

upstream minio_s3 {
    server minio:9000;
    keepalive 32;
}

upstream minio_console {
    server minio:9001;
    keepalive 16;
}

upstream grafana_backend {
    server grafana:3000;
    keepalive 8;
}

upstream mailhog_backend {
    server mailhog:8025;
    keepalive 8;
}

# Map des headers de sécurité communs
map $sent_http_content_type $csp_header {
    default "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'";
}


# HTTP → HTTPS Redirect (port 80)
server {
    listen 80;
    server_name _;

    # Autoriser Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tout le reste → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}


# API ZeroTrust - https://zerotrust.local
server {
    listen 443 ssl;
    http2 on;
    server_name zerotrust.local api.zerotrust.local;

    # Certificats TLS
    ssl_certificate     /etc/nginx/certs/zerotrust.crt;
    ssl_certificate_key /etc/nginx/certs/zerotrust.key;

    # Headers de sécurité (Hardening)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;


    # API FastAPI - /api/
    location /api/ {
        proxy_pass         http://api_backend/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Streaming: pas de buffering pour les uploads
        proxy_buffering          off;
        proxy_request_buffering  off;
        proxy_read_timeout       300s;
        proxy_send_timeout       300s;

        # Taille max cohérente avec nginx
        client_max_body_size 110M;
    }

    # Supabase Auth - /auth/
    location /auth/ {
        set $auth_backend http://auth:9999;
	proxy_pass $auth_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # Racine: API docs
    location / {
        proxy_pass         http://api_backend/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}


# MinIO S3 API - https://s3.zerotrust.local
server {
    listen 443 ssl;
    http2 on;
    server_name s3.zerotrust.local;

    ssl_certificate     /etc/nginx/certs/zerotrust.crt;
    ssl_certificate_key /etc/nginx/certs/zerotrust.key;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Désactiver le buffering pour le streaming S3
    proxy_buffering          off;
    proxy_request_buffering  off;

    # Ignorer les erreurs de certificat MinIO (interne)
    proxy_ssl_verify off;

    location / {
        proxy_pass              http://minio_s3;
        proxy_http_version      1.1;
        proxy_set_header        Host              minio:9000;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        Connection        "";
        proxy_connect_timeout   300s;
        proxy_read_timeout      300s;
        proxy_send_timeout      300s;
        client_max_body_size    0;  # Pas de limite côté Nginx pour S3
    }
}


# MinIO Console - https://console.zerotrust.local
server {
    listen 443 ssl;
    http2 on;
    server_name console.zerotrust.local;

    ssl_certificate     /etc/nginx/certs/zerotrust.crt;
    ssl_certificate_key /etc/nginx/certs/zerotrust.key;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location / {
        proxy_pass         http://minio_console;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}


# Grafana - https://monitoring.zerotrust.local
server {
    listen 443 ssl;
    http2 on;
    server_name monitoring.zerotrust.local;

    ssl_certificate     /etc/nginx/certs/zerotrust.crt;
    ssl_certificate_key /etc/nginx/certs/zerotrust.key;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location / {
        proxy_pass         http://grafana_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# MailHog (dev) - https://mail.zerotrust.local
server {
    listen 443 ssl;
    http2 on;
    server_name mail.zerotrust.local;

    ssl_certificate     /etc/nginx/certs/zerotrust.crt;
    ssl_certificate_key /etc/nginx/certs/zerotrust.key;

    add_header Strict-Transport-Security "max-age=63072000" always;

    location / {
        proxy_pass         http://mailhog_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}